name: DeepL Translation API Capabilities
description: >-
  Capabilities exposed by the DeepL API for text translation, document
  translation, glossaries, write/improve, language metadata, and usage.
capabilities:
  - name: Translate Text
    description: Translate up to 50 texts per request between supported languages.
    operationId: translateText
    method: POST
    path: /translate
  - name: Upload Document
    description: Upload a document for asynchronous translation.
    operationId: uploadDocument
    method: POST
    path: /document
  - name: Get Document Status
    description: Poll the status of a document translation.
    operationId: getDocumentStatus
    method: GET
    path: /document/{documentId}
  - name: Download Document
    description: Download the translated document once ready.
    operationId: downloadDocument
    method: GET
    path: /document/{documentId}/result
  - name: List Glossaries
    description: List glossaries owned by the account.
    operationId: listGlossaries
    method: GET
    path: /glossaries
  - name: Create Glossary
    description: Create a glossary for a specific language pair.
    operationId: createGlossary
    method: POST
    path: /glossaries
  - name: Delete Glossary
    description: Delete an existing glossary.
    operationId: deleteGlossary
    method: DELETE
    path: /glossaries/{glossaryId}
  - name: List Glossary Language Pairs
    description: List language pairs supported for glossaries.
    operationId: listGlossaryLanguagePairs
    method: GET
    path: /glossary-language-pairs
  - name: List Languages
    description: List supported source/target languages.
    operationId: listLanguages
    method: GET
    path: /languages
  - name: Get Usage
    description: Retrieve character usage and quota for the current billing period.
    operationId: getUsage
    method: GET
    path: /usage
  - name: Rephrase Text
    description: Improve or rephrase text using DeepL Write.
    operationId: rephraseText
    method: POST
    path: /write/rephrase
use_cases:
  - name: Localization automation
    description: Translate UI strings, marketing copy, and content batches with terminology control.
  - name: Document translation pipelines
    description: Translate Word, PowerPoint, PDF, and HTML documents while preserving formatting.
  - name: Customer support
    description: Translate support tickets, chats, and email between agents and customers in real time.
  - name: Editorial assistance
    description: Improve grammar and tone of drafted text using DeepL Write.

naftiko: 1.0.0-alpha2
info:
  label: DeepL Translation API — Glossaries
  description: 'DeepL Translation API — Glossaries. 6 operations. Lead operation: List glossaries. Self-contained Naftiko
    capability covering one Deepl business surface.'
  tags:
  - Deepl
  - Glossaries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEEPL_API_KEY: DEEPL_API_KEY
capability:
  consumes:
  - type: http
    namespace: translation-glossaries
    baseUri: https://api.deepl.com/v2
    description: DeepL Translation API — Glossaries business capability. Self-contained, no shared references.
    resources:
    - name: glossaries
      path: /glossaries
      operations:
      - name: listglossaries
        method: GET
        description: List glossaries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createglossary
        method: POST
        description: Create a glossary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: glossaries-glossaryId
      path: /glossaries/{glossaryId}
      operations:
      - name: getglossary
        method: GET
        description: Get a glossary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: glossaryId
          in: path
          type: string
          required: true
      - name: deleteglossary
        method: DELETE
        description: Delete a glossary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: glossaryId
          in: path
          type: string
          required: true
    - name: glossaries-glossaryId-entries
      path: /glossaries/{glossaryId}/entries
      operations:
      - name: getglossaryentries
        method: GET
        description: Get glossary entries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: glossaryId
          in: path
          type: string
          required: true
    - name: glossary-language-pairs
      path: /glossary-language-pairs
      operations:
      - name: listglossarylanguagepairs
        method: GET
        description: List supported glossary language pairs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.DEEPL_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: translation-glossaries-rest
    port: 8080
    description: REST adapter for DeepL Translation API — Glossaries. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/glossaries
      name: glossaries
      description: REST surface for glossaries.
      operations:
      - method: GET
        name: listglossaries
        description: List glossaries
        call: translation-glossaries.listglossaries
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createglossary
        description: Create a glossary
        call: translation-glossaries.createglossary
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/glossaries/{glossaryid}
      name: glossaries-glossaryid
      description: REST surface for glossaries-glossaryId.
      operations:
      - method: GET
        name: getglossary
        description: Get a glossary
        call: translation-glossaries.getglossary
        with:
          glossaryId: rest.glossaryId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteglossary
        description: Delete a glossary
        call: translation-glossaries.deleteglossary
        with:
          glossaryId: rest.glossaryId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/glossaries/{glossaryid}/entries
      name: glossaries-glossaryid-entries
      description: REST surface for glossaries-glossaryId-entries.
      operations:
      - method: GET
        name: getglossaryentries
        description: Get glossary entries
        call: translation-glossaries.getglossaryentries
        with:
          glossaryId: rest.glossaryId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/glossary-language-pairs
      name: glossary-language-pairs
      description: REST surface for glossary-language-pairs.
      operations:
      - method: GET
        name: listglossarylanguagepairs
        description: List supported glossary language pairs
        call: translation-glossaries.listglossarylanguagepairs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: translation-glossaries-mcp
    port: 9090
    transport: http
    description: MCP adapter for DeepL Translation API — Glossaries. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-glossaries
      description: List glossaries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: translation-glossaries.listglossaries
      outputParameters:
      - type: object
        mapping: $.
    - name: create-glossary
      description: Create a glossary
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: translation-glossaries.createglossary
      outputParameters:
      - type: object
        mapping: $.
    - name: get-glossary
      description: Get a glossary
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: translation-glossaries.getglossary
      with:
        glossaryId: tools.glossaryId
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-glossary
      description: Delete a glossary
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: translation-glossaries.deleteglossary
      with:
        glossaryId: tools.glossaryId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-glossary-entries
      description: Get glossary entries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: translation-glossaries.getglossaryentries
      with:
        glossaryId: tools.glossaryId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-supported-glossary-language-pairs
      description: List supported glossary language pairs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: translation-glossaries.listglossarylanguagepairs
      outputParameters:
      - type: object
        mapping: $.

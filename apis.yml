description: >-
  DeepL is an AI-powered translation service that delivers high-quality
  machine translation between dozens of languages, with support for
  context-aware translation, document translation, glossaries, and
  rephrasing/improvement via DeepL Write. The DeepL API is offered in Pro
  and Free tiers and exposes endpoints for text translation, document
  translation, glossaries, language metadata, usage, and write/rephrase.
apis:
  - aid: deepl:deepl-translation-api
    name: DeepL Translation API
    description: >-
      The DeepL Translation API provides programmatic access to DeepL's
      machine translation technology including text translate, document
      translate, glossaries, language metadata, usage, and DeepL Write
      rephrasing.

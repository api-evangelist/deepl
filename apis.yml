description: DeepL is an AI-powered translation service that delivers high-quality machine translation between dozens of languages,
  with support for context-aware translation, document translation, glossaries, and rephrasing/improvement via DeepL Write.
  The DeepL API is offered in Pro and Free tiers and exposes endpoints for text translation, document translation, glossaries,
  language metadata, usage, and write/rephrase.
